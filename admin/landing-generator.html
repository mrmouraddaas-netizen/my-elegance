<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page Generator - My Elegance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--black-2:#121212;--black-3:#1a1a1a;--gold:#D4AF37;--gold-light:#e8c84a;--gray:#999;--white:#fff;--gold-gradient:linear-gradient(135deg,#D4AF37,#e8c84a);--font-sans:'Segoe UI',system-ui,sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--font-sans);min-height:100vh}
.header{background:var(--black-2);border-bottom:1px solid rgba(212,175,55,.15);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.2rem;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .site-link{color:var(--gray);text-decoration:none;font-size:.85rem;transition:color .3s}
.header .site-link:hover{color:var(--gold)}
.main{max-width:900px;margin:0 auto;padding:32px 20px}
.selector-section{background:var(--black-2);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:24px;margin-bottom:32px}
.selector-section label{display:block;font-size:.85rem;color:var(--gray);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.selector-section select{width:100%;padding:12px 16px;background:var(--black-3);border:1px solid rgba(212,175,55,.2);border-radius:8px;color:var(--white);font-size:1rem;outline:none;cursor:pointer;transition:border-color .3s;appearance:auto}
.selector-section select:focus{border-color:var(--gold)}
.selector-section select option{background:var(--black-3);color:var(--white)}
.url-section{background:var(--black-2);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:24px;margin-bottom:32px;display:none}
.url-section.visible{display:block}
.url-section h3{font-size:.85rem;color:var(--gray);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.url-box{display:flex;gap:8px;align-items:center;background:var(--black-3);border:1px solid rgba(212,175,55,.1);border-radius:8px;padding:8px 12px}
.url-box input{flex:1;background:none;border:none;color:var(--gold);font-size:.88rem;outline:none;font-family:monospace}
.url-box button{background:var(--gold-gradient);color:var(--black);border:none;border-radius:6px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:.8rem;transition:all .2s;white-space:nowrap}
.url-box button:hover{opacity:.9}
.preview-section{background:var(--black-2);border:1px solid rgba(212,175,55,.12);border-radius:12px;overflow:hidden;display:none}
.preview-section.visible{display:block}
.preview-section .preview-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid rgba(212,175,55,.1);flex-wrap:wrap;gap:8px}
.preview-section .preview-header h3{font-size:.85rem;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.preview-section .preview-header .badge{padding:4px 12px;border-radius:12px;background:rgba(212,175,55,.15);color:var(--gold);font-size:.72rem;font-weight:600}
.preview-frame{width:100%;min-height:500px;border:none;background:var(--black)}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray)}
.empty-state svg{width:48px;height:48px;fill:var(--gray);opacity:.3;margin-bottom:16px}
.empty-state h2{font-size:1.2rem;color:var(--white);margin-bottom:8px}
.empty-state p{font-size:.9rem;max-width:400px;margin:0 auto}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.actions .btn{padding:10px 20px;border-radius:8px;border:none;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.actions .btn-primary{background:var(--gold-gradient);color:var(--black)}
.actions .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.actions .btn-secondary{background:var(--black-3);color:var(--gold);border:1px solid rgba(212,175,55,.2)}
.actions .btn-secondary:hover{border-color:var(--gold);background:rgba(212,175,55,.1)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--black-3);color:var(--gold);padding:12px 24px;border-radius:8px;border:1px solid rgba(212,175,55,.2);font-size:.9rem;font-weight:600;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){
  .main{padding:20px 12px}
  .selector-section,.url-section,.preview-section{padding:16px}
  .preview-frame{min-height:350px}
}
</style>
</head>
<body>
<div class="header">
  <h1>&#9733; Landing Page Generator</h1>
  <a href="../" class="site-link" target="_blank">&#8599; View Site</a>
</div>
<div class="main">
  <div class="selector-section">
    <label for="productSelect">Select a product</label>
    <select id="productSelect" onchange="onProductSelect(this.value)">
      <option value="">-- Choose a product --</option>
    </select>
  </div>
  <div class="url-section" id="urlSection">
    <h3>Shareable URL</h3>
    <div class="url-box">
      <input type="text" id="landingUrl" readonly>
      <button onclick="copyUrl()">Copy URL</button>
    </div>
    <div class="actions">
      <a class="btn btn-primary" id="openLandingBtn" target="_blank" rel="noopener">Open Landing Page &#8599;</a>
      <button class="btn btn-secondary" onclick="downloadLanding()">Download HTML &#8681;</button>
    </div>
  </div>
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    <h2>No product selected</h2>
    <p>Choose a product above to generate a beautiful landing page you can share on Instagram, Facebook, or WhatsApp.</p>
  </div>
  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <h3>Landing Page Preview</h3>
      <span class="badge" id="previewBadge">Preview</span>
    </div>
    <iframe class="preview-frame" id="previewFrame" srcdoc=""></iframe>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const baseUrl = location.origin;
let products = {};
let selectedId = null;

async function loadProducts(){
  try{
    const r=await fetch('../content/products.json?'+Date.now());
    if(!r.ok)throw new Error('Not found');
    const d=await r.json();
    const list=d.products||d;
    const sel=document.getElementById('productSelect');
    list.forEach(p=>{
      if(p.active===false)return;
      products[p.id]=p;
      const opt=document.createElement('option');
      opt.value=p.id;
      opt.textContent=p.name_en+' ('+p.price.toLocaleString()+' DZD)';
      sel.appendChild(opt);
    });
  }catch(e){
    document.getElementById('emptyState').innerHTML='<h2>Failed to load products</h2><p>Make sure the site is deployed and try again.</p>';
  }
}

function onProductSelect(id){
  if(!id||!products[id]){selectedId=null;document.getElementById('urlSection').classList.remove('visible');document.getElementById('previewSection').classList.remove('visible');document.getElementById('emptyState').style.display='block';return}
  selectedId=id;
  document.getElementById('emptyState').style.display='none';
  const p=products[id];
  const url=baseUrl+'/#landing/'+id;
  document.getElementById('landingUrl').value=url;
  document.getElementById('openLandingBtn').href=url;
  document.getElementById('urlSection').classList.add('visible');
  document.getElementById('previewSection').classList.add('visible');
  document.getElementById('previewBadge').textContent=p.name_en;
  generatePreview(id);
}

function generatePreview(id){
  const p=products[id];if(!p)return;
  const price=p.price.toLocaleString()+' DZD';
  const img=p.image||'../assets/images/watches/placeholder.jpg';
  const desc=p.desc_en||'';
  const wpNum='213554672222';
  const wpMsg=encodeURIComponent('Hello! I am interested in: '+p.name_en+' ('+price+')');
  document.getElementById('previewFrame').srcdoc='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;min-height:100vh}.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 50%,#0a0a0a 100%);position:relative;overflow:hidden;padding:60px 20px}.hero::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(212,175,55,.08) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(212,175,55,.05) 0%,transparent 50%);animation:glow 8s ease-in-out infinite alternate}@keyframes glow{0%{transform:translate(0,0)}100%{transform:translate(-5%,-5%)}}.content{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:40px;max-width:1000px;width:100%}.img-box{flex:0 0 280px;max-width:280px}.img-box img{width:100%;height:auto;border-radius:16px;box-shadow:0 20px 60px rgba(212,175,55,.15)}.text-box{flex:1;min-width:260px;max-width:500px}.badge{display:inline-block;padding:5px 14px;border-radius:20px;background:rgba(212,175,55,.15);color:#D4AF37;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}.text-box h1{font-size:2.5rem;font-weight:800;line-height:1.2;margin-bottom:10px;background:linear-gradient(135deg,#D4AF37,#e8c84a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.text-box .price{font-size:1.8rem;font-weight:700;color:#D4AF37;margin-bottom:10px}.text-box .desc{color:#999;font-size:1rem;line-height:1.6;margin-bottom:20px}.cta{display:flex;gap:10px;flex-wrap:wrap}.cta .btn{padding:12px 28px;font-size:.95rem;border-radius:8px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-weight:700;cursor:pointer;border:none;transition:all .3s}.cta .btn-primary{background:linear-gradient(135deg,#D4AF37,#e8c84a);color:#0a0a0a;box-shadow:0 4px 20px rgba(212,175,55,.3)}.cta .btn-secondary{background:transparent;color:#D4AF37;border:2px solid rgba(212,175,55,.3)}.features{display:flex;gap:20px;margin-top:24px;flex-wrap:wrap}.features span{display:flex;align-items:center;gap:6px;color:#999;font-size:.82rem}.brand{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:.75rem;letter-spacing:2px;text-transform:uppercase}@media(max-width:600px){.img-box{flex:0 0 200px;max-width:200px}.text-box h1{font-size:1.8rem}.text-box .price{font-size:1.4rem}}</style></head><body><div class="hero"><div class="content"><div class="img-box"><img src="'+img+'" alt="'+p.name_en+'"></div><div class="text-box"><div class="badge">&#9733; Featured Product</div><h1>'+p.name_en+'</h1><div class="price">'+price+'</div><div class="desc">'+desc+'</div><div class="cta"><a href="https://wa.me/'+wpNum+'?text='+wpMsg+'" target="_blank" rel="noopener" class="btn btn-primary">&#9990; Order on WhatsApp</a><a href="'+baseUrl+'/#landing/'+id+'" class="btn btn-secondary">View Details</a></div><div class="features"><span>&#128666; Delivery Algeria</span><span>&#128737; Authentic</span><span>&#128260; Easy Returns</span></div></div></div></div><div class="brand">My Elegance</div></body></html>';
}

function copyUrl(){
  const inp=document.getElementById('landingUrl');
  inp.select();inp.setSelectionRange(0,99999);
  navigator.clipboard.writeText(inp.value).then(()=>{showToast('URL copied!')}).catch(()=>{showToast('Copy: '+inp.value)});
}

function downloadLanding(){
  const p=products[selectedId];if(!p)return;
  const price=p.price.toLocaleString()+' DZD';
  const img=p.image||'assets/images/watches/placeholder.jpg';
  const desc=p.desc_en||'';
  const wpNum='213554672222';
  const wpMsg=encodeURIComponent('Hello! I am interested in: '+p.name_en+' ('+price+')');
  const html='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+p.name_en+' - My Elegance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;min-height:100vh}.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 50%,#0a0a0a 100%);position:relative;overflow:hidden;padding:60px 20px}.hero::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(212,175,55,.08) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(212,175,55,.05) 0%,transparent 50%);animation:glow 8s ease-in-out infinite alternate}@keyframes glow{0%{transform:translate(0,0)}100%{transform:translate(-5%,-5%)}}.content{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:40px;max-width:1000px;width:100%}.img-box{flex:0 0 280px;max-width:280px}.img-box img{width:100%;height:auto;border-radius:16px;box-shadow:0 20px 60px rgba(212,175,55,.15)}.text-box{flex:1;min-width:260px;max-width:500px}.badge{display:inline-block;padding:5px 14px;border-radius:20px;background:rgba(212,175,55,.15);color:#D4AF37;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}.text-box h1{font-size:2.5rem;font-weight:800;line-height:1.2;margin-bottom:10px;background:linear-gradient(135deg,#D4AF37,#e8c84a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.text-box .price{font-size:1.8rem;font-weight:700;color:#D4AF37;margin-bottom:10px}.text-box .desc{color:#999;font-size:1rem;line-height:1.6;margin-bottom:20px}.cta{display:flex;gap:10px;flex-wrap:wrap}.cta .btn{padding:12px 28px;font-size:.95rem;border-radius:8px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-weight:700;cursor:pointer;border:none;transition:all .3s}.cta .btn-primary{background:linear-gradient(135deg,#D4AF37,#e8c84a);color:#0a0a0a;box-shadow:0 4px 20px rgba(212,175,55,.3)}.cta .btn-secondary{background:transparent;color:#D4AF37;border:2px solid rgba(212,175,55,.3)}.features{display:flex;gap:20px;margin-top:24px;flex-wrap:wrap}.features span{display:flex;align-items:center;gap:6px;color:#999;font-size:.82rem}.brand{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:.75rem;letter-spacing:2px;text-transform:uppercase}@media(max-width:600px){.img-box{flex:0 0 200px;max-width:200px}.text-box h1{font-size:1.8rem}.text-box .price{font-size:1.4rem}}</style></head><body><div class="hero"><div class="content"><div class="img-box"><img src="'+img+'" alt="'+p.name_en+'"></div><div class="text-box"><div class="badge">&#9733; Featured Product</div><h1>'+p.name_en+'</h1><div class="price">'+price+'</div><div class="desc">'+desc+'</div><div class="cta"><a href="https://wa.me/'+wpNum+'?text='+wpMsg+'" target="_blank" rel="noopener" class="btn btn-primary">&#9990; Order on WhatsApp</a><a href="'+baseUrl+'/#landing/'+selectedId+'" class="btn btn-secondary">View Details</a></div><div class="features"><span>&#128666; Delivery Algeria</span><span>&#128737; Authentic</span><span>&#128260; Easy Returns</span></div></div></div></div><div class="brand">My Elegance</div></body></html>';
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=p.name_en.toLowerCase().replace(/\s+/g,'-')+'-landing.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Landing page downloaded!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2500);
}

loadProducts();
</script>
</body>
</html>
