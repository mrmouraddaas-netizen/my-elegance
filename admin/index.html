<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Elegance - CMS</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px;padding:20px}
    .logo{font-size:1.6rem;font-weight:900;letter-spacing:2px;text-transform:uppercase}
    .gold{color:#D4AF37}
    .white{color:#e0e0e0}
    .loader{width:40px;height:40px;border:3px solid rgba(212,175,55,.15);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#888;font-size:.9rem}
  </style>
</head>
<body>
  <div class="logo"><span class="white">MY</span><span class="gold">ELEGANCE</span></div>
  <div class="loader"></div>
  <p>Loading product manager...</p>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
