<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
body{margin:0;background:#000;color:#fff}
.marquee-section{overflow:hidden;background:#111;border-top:1px solid rgba(212,175,55,.1);border-bottom:1px solid rgba(212,175,55,.1)}
.marquee-section article{overflow:hidden;white-space:nowrap;position:relative;height:100px}
.marquee-section ul{display:flex;padding:0;margin:0;list-style:none;position:absolute;left:0;top:50%;transform:translateY(-50%);animation:marquee 5s linear infinite}
.marquee-section ul.animate-invert{animation:marquee-invert 5s linear infinite}
.marquee-letter{flex:none;padding:0 8px;font-family:sans-serif;font-size:3rem;font-weight:900;text-transform:uppercase;color:#fff}
.marquee-letter.outline{color:transparent;-webkit-text-stroke:2px gold}
.marquee-letter.star{color:gold;font-weight:300}
@keyframes marquee{0%{transform:translateY(-50%) translateX(0)}100%{transform:translateY(-50%) translateX(-50%)}}
@keyframes marquee-invert{0%{transform:translateY(-50%) translateX(0)}100%{transform:translateY(-50%) translateX(-50%)}}
</style>
</head>
<body>
<section class="marquee-section">
<article>
<ul>
<li class="marquee-letter">B</li><li class="marquee-letter">O</li><li class="marquee-letter">D</li><li class="marquee-letter">Y</li><li class="marquee-letter outline">G</li><li class="marquee-letter outline">L</li><li class="marquee-letter outline">A</li><li class="marquee-letter outline">D</li><li class="marquee-letter star">✦</li>
<li class="marquee-letter">B</li><li class="marquee-letter">O</li><li class="marquee-letter">D</li><li class="marquee-letter">Y</li><li class="marquee-letter outline">G</li><li class="marquee-letter outline">L</li><li class="marquee-letter outline">A</li><li class="marquee-letter outline">D</li><li class="marquee-letter star">✦</li>
</ul>
</article>
</section>
</body>
</html>
