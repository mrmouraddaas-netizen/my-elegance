<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;min-height:100vh}
.wrap{overflow:hidden;width:100%;background:#111;padding:30px 0;position:relative}
.track{display:flex;width:max-content;animation:go 3s linear infinite;border:2px solid red}
.item{flex:none;padding:0 20px;font:900 72px/1 sans-serif;color:#fff;border:1px solid yellow}
.outline{color:transparent;-webkit-text-stroke:2px gold}
@keyframes go{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
</style>
</head>
<body>
<div class="wrap">
<div class="track">
<div class="item">B</div><div class="item">O</div><div class="item">D</div><div class="item">Y</div><div class="item outline">G</div><div class="item outline">L</div><div class="item outline">A</div><div class="item outline">D</div><div class="item">✦</div>
<div class="item">B</div><div class="item">O</div><div class="item">D</div><div class="item">Y</div><div class="item outline">G</div><div class="item outline">L</div><div class="item outline">A</div><div class="item outline">D</div><div class="item">✦</div>
</div>
</div>
</body>
</html>
